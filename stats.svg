<svg viewBox="0 0 480 250" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="statBg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#1a0f2e"/>
    <stop offset="100%" stop-color="#2d1654"/>
  </linearGradient>
  <style>
    .sans { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    .card-in { opacity: 0; animation: slideIn 0.6s ease-out forwards; }
    @keyframes slideIn { 0% { opacity: 0; transform: translateX(-16px); } 100% { opacity: 1; transform: translateX(0); } }
    .ring { stroke-dasharray: 220; stroke-dashoffset: 220; animation: drawRing 1.6s ease-out forwards; animation-delay: 0.3s; }
    @keyframes drawRing { to { stroke-dashoffset: 20; } }
    .num { opacity: 0; animation: fadeIn 0.5s ease-out forwards; }
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</defs>
<rect x="0" y="0" width="480" height="250" rx="14" fill="url(#statBg)" stroke="#4a2b7a" stroke-width="1.5"/>
<text x="24" y="34" class="sans" font-size="16" font-weight="700" fill="#f5f0ff">Design Practice Snapshot</text>

<!-- ring -->
<g transform="translate(85,155)">
  <circle r="50" fill="none" stroke="#3a2160" stroke-width="10"/>
  <circle class="ring" r="50" fill="none" stroke="#ff6ec7" stroke-width="10" stroke-linecap="round" transform="rotate(-90)"/>
  <text text-anchor="middle" class="sans num" style="animation-delay:1.2s">
    <tspan x="0" dy="-2" font-size="14" font-weight="700" fill="#f5f0ff">Masters</tspan>
    <tspan x="0" dy="15" font-size="10" font-weight="500" fill="#c9a8ff">Visual Design</tspan>
  </text>
</g>

<g class="sans">

  <g class="card-in" style="animation-delay:0.4s">
    <text x="150" y="70" font-size="24" font-weight="700" fill="#f5f0ff" text-anchor="start">3+</text>
    <text x="192" y="60" font-size="11.5" fill="#c9a8ff">major case</text>
    <text x="192" y="76" font-size="11.5" fill="#c9a8ff">studies</text>
  </g>
  <g class="card-in" style="animation-delay:0.6000000000000001s">
    <text x="150" y="120" font-size="24" font-weight="700" fill="#f5f0ff" text-anchor="start">1</text>
    <text x="192" y="110" font-size="11.5" fill="#c9a8ff">internship in</text>
    <text x="192" y="126" font-size="11.5" fill="#c9a8ff">data visualisation</text>
  </g>
  <g class="card-in" style="animation-delay:0.8s">
    <text x="150" y="170" font-size="24" font-weight="700" fill="#f5f0ff" text-anchor="start">8</text>
    <text x="192" y="160" font-size="11.5" fill="#c9a8ff">months experience in</text>
    <text x="192" y="176" font-size="11.5" fill="#c9a8ff">visual &amp; UX design</text>
  </g>
  <g class="card-in" style="animation-delay:1.0s">
    <text x="150" y="220" font-size="24" font-weight="700" fill="#f5f0ff" text-anchor="start">2</text>
    <text x="192" y="210" font-size="11.5" fill="#c9a8ff">exhibitions &#8212; 1.Shanthi</text>
    <text x="192" y="226" font-size="11.5" fill="#c9a8ff">Road &amp; CSTEP</text>
  </g>
</g>
</svg>